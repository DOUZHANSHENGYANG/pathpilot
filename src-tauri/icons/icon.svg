    <circle cx="-280" cy="0" r="36" fill="white" opacity="0.9"/>
    <!-- Target dot -->
    <circle cx="280" cy="200" r="36" fill="white" opacity="0.9"/>
  </g>
  <!-- Bottom text: "PP" -->
  <text x="512" y="820" text-anchor="middle" font-family="Inter, sans-serif" font-size="160" font-weight="700" fill="white" opacity="0.25">PP</text>
